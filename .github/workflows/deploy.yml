name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b4d05d1d60ee0af42fc26e4745949d89222 # v0.4.0
        with:
          version: 'latest'

      - name: Build WASM
        run: wasm-pack build --target web --out-dir webapp/pkg --release
        env:
          # Disabling wasm-opt as it can be slow/fail in CI if not needed
          WASM_PACK_PROFILE: release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install JS Dependencies
        run: cd webapp && npm install

      - name: Build Webapp
        run: cd webapp && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './webapp/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
